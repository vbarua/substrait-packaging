[workspace]
name = "substrait-packaging"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "linux-aarch64"]

[tasks]
python-generate-antlr = { cmd = "cd python/substrait-antlr && ./generate_antlr.sh", description = "Generate ANTLR Python parsers" }
python-generate-protobuf = { cmd = "cd python/substrait-protobuf && ./generate_protobuf.sh", description = "Generate protobuf Python code" }
python-generate-extensions = { cmd = "cd python/substrait-extensions && ./generate_extensions.sh", description = "Package Substrait extensions files" }

[dependencies]
antlr = ">=4.13.2,<5"
buf = ">=1.62.1,<2"
datamodel-code-generator = ">=0.52.0,<0.53"
ruff = ">=0.14.10,<0.15"
uv = ">=0.9.25,<1"
